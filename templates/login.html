<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Satan Scanner Login</title>
    <style>
        body { 
            background: #0f0f0f; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: sans-serif; 
            margin: 0;
        }
        form { 
            border: 1px solid #ff0000; 
            padding: 40px; 
            border-radius: 8px; 
            background: #1a1a1a; 
            width: 300px; 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
        }
        h2 { color: #ff0000; text-align: center; margin-bottom: 25px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: #000; 
            border: 1px solid #333; 
            color: #fff; 
            box-sizing: border-box; 
            border-radius: 4px;
        }
        input:focus { border: 1px solid #ff0000; outline: none; }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #ff0000; 
            border: none; 
            color: #fff; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
            border-radius: 4px;
        }
        button:hover { background: #cc0000; }
    </style>
</head>
<body>
    <form method="POST">
        <h2>Satan Scanner</h2>
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">LOGIN</button>
    </form>
</body>
</html>
