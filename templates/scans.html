<table id="scans-table">
    <thead>
        <tr><th>Key</th><th>Status</th><th>Date</th><th>Results</th></tr>
    </thead>
    <tbody id="data-body"></tbody>
</table>

<script>
    fetch('/get-reports')
    .then(res => res.json())
    .then(data => {
        const tbody = document.getElementById('data-body');
        tbody.innerHTML = ""; // Καθαρισμός
        data.forEach(item => {
            tbody.innerHTML += `<tr>
                <td>${item.key}</td>
                <td>${item.status}</td>
                <td>${item.date}</td>
                <td>${item.results ? item.results.join(", ") : "None"}</td>
            </tr>`;
        });
    });
</script>
